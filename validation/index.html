<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation des tags — revue à l'aveugle</title>
<meta name="description" content="Revue humaine à l'aveugle d'un échantillon de fiches ICPE taguées, pour mesurer la justesse du tagging par axe.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23b4502e'/%3E%3Cpath d='M9 16.5l4.5 4.5L23 11' stroke='%23fff' stroke-width='3.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="../shared/tokens.css?v=1">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); color: var(--ink);
    font-family: 'IBM Plex Sans', system-ui, sans-serif; line-height: 1.5; }
  :root[data-theme="dark"] {
    --paper: #1a1714; --paper-2: #221e19; --paper-3: #2a2520;
    --ink: #f4efe6; --ink-soft: rgba(244,239,230,0.72); --rule-soft: rgba(244,239,230,0.22); }
  code, .mono { font-family: 'IBM Plex Mono', monospace; }

  header.bar { position: sticky; top: 0; z-index: 10; background: var(--paper-2);
    border-bottom: 1px solid var(--rule-soft); padding: 9px 16px;
    display: flex; gap: 10px 14px; align-items: center; flex-wrap: wrap; }
  header .title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; margin-right: auto; }
  header label { font-size: 13px; color: var(--ink-soft); }
  header input, header button { font: inherit; font-size: 13px; padding: 6px 10px;
    border: 1px solid var(--rule-soft); border-radius: 7px; background: var(--paper); color: var(--ink); }
  header button { cursor: pointer; min-height: 38px; }
  header button:hover { background: var(--paper-3); }
  .progress { font-variant-numeric: tabular-nums; font-size: 13px; }
  .progress b { color: var(--rust); }

  main { max-width: 900px; margin: 0 auto; padding: 16px; }

  /* fiche context — collapsible */
  .context { background: var(--paper-2); border: 1px solid var(--rule-soft);
    border-radius: 10px; padding: 16px 18px; margin-bottom: 16px; }
  .context h2 { font-family: 'Fraunces', serif; font-size: 18px; margin: 0 0 2px; }
  .context .meta { font-size: 12.5px; color: var(--ink-soft); margin-bottom: 10px; }
  .context .meta .mono { color: var(--rust); }
  .fl { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); margin: 12px 0 4px; }
  .body-text { white-space: pre-wrap; font-size: 15px; }
  .body-text.prescription { font-size: 13.5px; color: var(--ink-soft); }
  .context.collapsed .body-wrap { max-height: 4.5em; overflow: hidden;
    -webkit-mask-image: linear-gradient(#000 60%, transparent); mask-image: linear-gradient(#000 60%, transparent); }
  .context .toggle { margin-top: 8px; font-size: 13px; color: var(--rust); background: none;
    border: none; cursor: pointer; padding: 0; font-family: inherit; }

  /* accordion of axes */
  .sec { border: 1px solid var(--rule-soft); border-radius: 10px; margin-bottom: 9px; overflow: hidden; background: var(--paper-2); }
  .sec.open { border-color: var(--rust); }
  .shead { width: 100%; display: flex; align-items: center; gap: 10px; cursor: pointer;
    background: none; border: none; color: var(--ink); font: inherit; text-align: left;
    padding: 13px 15px; min-height: 52px; }
  .shead:hover { background: var(--paper-3); }
  .shead .sname { font-weight: 600; font-size: 15px; white-space: nowrap; }
  .shead .sval { color: var(--ink-soft); font-size: 13.5px; margin-left: auto; text-align: right; }
  .shead .sval.set { color: var(--rust); font-family: 'IBM Plex Mono', monospace; }
  .shead .chev { color: var(--ink-soft); font-size: 12px; transition: transform .15s; }
  .sec.open .chev { transform: rotate(90deg); }
  .sec.done:not(.open) .sname::before { content: "✓ "; color: var(--ochre); }

  .sbody { padding: 4px 10px 12px; }
  .saxis-help { font-size: 12.5px; color: var(--ink-soft); padding: 2px 5px 10px; }
  .orow { width: 100%; display: block; text-align: left; cursor: pointer; font: inherit;
    background: var(--paper); color: var(--ink); border: 1px solid var(--rule-soft);
    border-radius: 8px; padding: 10px 13px; margin-bottom: 7px; }
  .orow:hover { border-color: var(--rust); }
  .orow[aria-pressed="true"] { border-color: var(--rust); background: color-mix(in srgb, var(--rust) 12%, var(--paper)); }
  .orow[aria-pressed="true"] .ocode { color: var(--rust); }
  .ohead { display: flex; align-items: baseline; gap: 8px; }
  .ocode { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 14px; }
  .oname { font-size: 14px; font-weight: 500; }
  .odef { display: block; font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; line-height: 1.4; }
  .snext { width: 100%; margin-top: 4px; padding: 11px; font: inherit; font-weight: 600; cursor: pointer;
    background: var(--paper-3); border: 1px solid var(--rule-soft); border-radius: 8px; color: var(--ink); }

  .actions { position: sticky; bottom: 0; background: var(--paper); padding: 12px 0 4px;
    margin-top: 6px; display: flex; gap: 10px; align-items: center; border-top: 1px solid var(--rule-soft); }
  .actions button.primary { font: inherit; font-weight: 600; padding: 13px 18px; cursor: pointer;
    background: var(--rust); color: #fff; border: none; border-radius: 9px; flex: 1; min-height: 48px; }
  .actions button.primary:disabled { opacity: .5; }
  .done-badge { color: var(--ochre); font-size: 12.5px; font-weight: 600; }

  .intro { max-width: 640px; margin: 40px auto; padding: 0 18px; }
  .intro h1 { font-family: 'Fraunces', serif; }
  .kbd { font-family: 'IBM Plex Mono', monospace; font-size: 12px; border: 1px solid var(--rule-soft);
    border-bottom-width: 2px; border-radius: 4px; padding: 1px 5px; }

  /* help modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 60;
    display: flex; align-items: center; justify-content: center; padding: 18px; }
  .modal { background: var(--paper); color: var(--ink); max-width: 620px; max-height: 86vh;
    overflow: auto; border-radius: 12px; padding: 24px 28px; border: 1px solid var(--rule-soft); }
  .modal h2 { font-family: 'Fraunces', serif; margin-top: 0; }
  .modal h3 { font-family: 'Fraunces', serif; font-size: 15px; margin: 16px 0 4px; }
  .modal p, .modal li { font-size: 14.5px; }
  .modal .close { float: right; cursor: pointer; border: 1px solid var(--rule-soft);
    background: none; color: var(--ink); border-radius: 7px; padding: 6px 12px; font: inherit; }

  @media (max-width: 620px) {
    header .title { font-size: 15px; width: 100%; margin-right: 0; }
    main { padding: 12px; }
    .shead { padding: 14px; min-height: 56px; }
    .orow { padding: 12px 14px; }
  }

  /* Peek-from-the-side text panel (mobile) — the fiche text stays one tap away
     after you scroll into the options. Edge tab = the "peek"; opens a wide,
     readable panel. Documented as a side-sheet variant (Material). */
  #text-tab, #text-panel, #text-backdrop, .open-text { display: none; }
  @media (max-width: 860px) {
    #text-tab { display: block; position: fixed; right: 0; top: 40%; z-index: 40;
      writing-mode: vertical-rl;                 /* texte vertical, sans rotation qui inversait coins + ombre */
      background: var(--rust); color: #fff; border: none; padding: 16px 9px;
      border-radius: 11px 0 0 11px;              /* coins arrondis côté contenu (gauche), plat contre le bord (droite) */
      font: inherit; font-weight: 600; font-size: 13px;
      letter-spacing: .03em; cursor: pointer; box-shadow: -3px 2px 11px rgba(0,0,0,.24); }
    #text-backdrop { display: block; position: fixed; inset: 0; z-index: 44;
      background: rgba(0,0,0,.4); opacity: 0; pointer-events: none; transition: opacity .2s; }
    #text-backdrop.on { opacity: 1; pointer-events: auto; }
    #text-panel { display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; right: 0;
      z-index: 45; width: min(93vw, 540px); background: var(--paper);
      border-left: 1px solid var(--rule-soft); transform: translateX(100%); transition: transform .22s ease; }
    #text-panel.open { transform: translateX(0); box-shadow: -6px 0 26px rgba(0,0,0,.28); }
    .tp-head { display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 13px 16px; border-bottom: 1px solid var(--rule-soft); }
    .tp-head b { font-family: 'Fraunces', serif; font-size: 15px; }
    .tp-head button { font: inherit; background: none; border: 1px solid var(--rule-soft);
      color: var(--ink); border-radius: 8px; padding: 8px 13px; cursor: pointer; min-height: 40px; }
    #tp-body { overflow: auto; padding: 14px 16px 28px; -webkit-overflow-scrolling: touch; }
    #tp-body .fl { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); margin: 4px 0 4px; }
    #tp-body .body-text { white-space: pre-wrap; font-size: 15px; }
    #tp-body .body-text.prescription { font-size: 13.5px; color: var(--ink-soft); margin-top: 12px; }
    /* le texte inline en haut est redondant avec le panneau — on l'allège */
    .context .body-wrap { max-height: 4.5em; overflow: hidden;
      -webkit-mask-image: linear-gradient(#000 60%, transparent); mask-image: linear-gradient(#000 60%, transparent); }
    .context .toggle { display: none; }
    .open-text { display: inline-block; margin-top: 8px; background: none; border: none;
      color: var(--rust); font: inherit; font-weight: 600; font-size: 13.5px; cursor: pointer; padding: 6px 0; }
  }
</style>
</head>
<body>

<header class="bar">
  <span class="title">Validation des tags — à l'aveugle</span>
  <label>Relecteur·rice <input id="reviewer" placeholder="ex. AB" size="6" autocomplete="off"></label>
  <span class="progress" id="progress">…</span>
  <button id="prev" title="Fiche précédente (←)">←</button>
  <button id="next" title="Fiche suivante (→)">→</button>
  <button id="export">Exporter</button>
  <button id="import">Importer</button>
  <input type="file" id="file" accept="application/json" hidden>
  <button id="help-btn" title="Aide">? Aide</button>
  <button id="theme" title="Thème clair/sombre">◐</button>
</header>

<div id="app"></div>
<div class="intro" id="intro"><h1>Chargement…</h1></div>

<button id="text-tab" aria-label="Voir le texte de la fiche">📄 Texte</button>
<div id="text-backdrop"></div>
<aside id="text-panel" aria-hidden="true" aria-label="Texte de la fiche">
  <div class="tp-head"><b>Texte de la fiche</b><button id="tp-close">Fermer ✕</button></div>
  <div id="tp-body"></div>
</aside>

<script>
// axis order for labelling: gravity first (required), then subject, then the rest
const ORDER = ["gravity", "domains", "mechanisms", "dynamic", "trajectory", "stage", "actor", "modifiers"];
const MULTI = new Set(["domains", "mechanisms", "modifiers"]);
const AXIS_TITLE = {
  gravity: "Gravité", dynamic: "Dynamique", trajectory: "Trajectoire", stage: "Stade",
  actor: "Acteur", domains: "Domaine", mechanisms: "Mécanisme", modifiers: "Modificateurs" };
let DATA = null, idx = 0, decisions = {}, openSec = null, ctxCollapsed = false;

const storeKey = () => "icpe-validation:" + (document.getElementById("reviewer").value.trim() || "anon");
function restore() { try { decisions = JSON.parse(localStorage.getItem(storeKey())) || {}; } catch { decisions = {}; } }
function persist() { localStorage.setItem(storeKey(), JSON.stringify(decisions));
  localStorage.setItem("icpe-validation:last-reviewer", document.getElementById("reviewer").value.trim()); }
function firstUnreviewed() { const i = DATA.items.findIndex(it => decisions[it.fiche_id]?.done); return i === -1 ? 0 : i; }
function esc(s) { return String(s ?? "").replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }

function load() {
  fetch("validation-sample.json?v=2").then(r => r.json()).then(d => {
    DATA = d;
    document.getElementById("reviewer").value = localStorage.getItem("icpe-validation:last-reviewer") || "";
    restore(); idx = firstUnreviewed(); render();
    if (!localStorage.getItem("icpe-validation:seen-help")) {
      localStorage.setItem("icpe-validation:seen-help", "1"); setTimeout(openHelp, 400);
    }
  }).catch(e => { document.getElementById("intro").innerHTML = "<h1>Erreur</h1><p>" + e + "</p>"; });
}

function valOf(field) { return (decisions[DATA.items[idx].fiche_id] || {})[field]; }
function isAnswered(field) {
  const v = valOf(field);
  return MULTI.has(field) ? Array.isArray(v) && v.length > 0 : !!v;
}
function summary(field) {
  const v = valOf(field);
  if (MULTI.has(field)) return (v && v.length) ? v.join(" · ") : "—";
  return v ? `${v} · ${DATA.labels[v] || ""}` : "—";
}

function render() {
  const it = DATA.items[idx];
  if (!decisions[it.fiche_id]) decisions[it.fiche_id] = {};
  // default: open first unanswered axis
  if (openSec === null) openSec = ORDER.find(f => !isAnswered(f)) || ORDER[0];
  document.getElementById("intro").style.display = "none";

  const answered = ORDER.filter(isAnswered).length;
  document.getElementById("progress").innerHTML =
    `fiche <b>${idx + 1}</b>/${DATA.n} · ${Object.values(decisions).filter(d=>d.done).length} finies · axes ${answered}/${ORDER.length}`;

  const secHtml = (field) => {
    const open = openSec === field, multi = MULTI.has(field), done = isAnswered(field);
    const opts = DATA.options[field];
    const rows = open ? `<div class="sbody">
        <div class="saxis-help">${esc((DATA.axis_help||{})[field]||"")}${multi ? " — plusieurs choix possibles." : ""}</div>
        ${opts.map((o, i) => {
          const on = multi ? (valOf(field)||[]).includes(o) : valOf(field) === o;
          const num = (!multi && i < 9) ? `<span class="kbd" style="opacity:.5;margin-left:6px">${i+1}</span>` : "";
          return `<button class="orow" data-field="${field}" data-opt="${o}" aria-pressed="${on}">
            <span class="ohead"><span class="ocode">${o}</span><span class="oname">${esc(DATA.labels[o]||"")}</span>${num}</span>
            <span class="odef">${esc((DATA.code_help||{})[o]||"")}</span></button>`;
        }).join("")}
        ${multi ? `<button class="snext" data-next="1">Suivant ›</button>` : ""}
      </div>` : "";
    return `<div class="sec ${open?"open":""} ${done?"done":""}">
      <button class="shead" data-sec="${field}">
        <span class="sname">${AXIS_TITLE[field]}</span>
        <span class="sval ${done?"set":""}">${esc(summary(field))}</span>
        <span class="chev">▸</span>
      </button>${rows}</div>`;
  };

  const allDone = ORDER.every(isAnswered), gravSet = isAnswered("gravity");
  document.getElementById("app").innerHTML = `<main>
    <section class="context ${ctxCollapsed?"collapsed":""}">
      <h2>${esc(it.nom || "—")}</h2>
      <div class="meta">${esc(it.commune||"")} · ${esc(it.date||"")} · ${esc(it.theme||"—")} · <span class="mono">${it.fiche_id}</span></div>
      <div class="body-wrap">
        <div class="fl">Constats</div><div class="body-text">${esc(it.constats_body)}</div>
        ${it.prescription ? `<div class="fl">Prescription</div><div class="body-text prescription">${esc(it.prescription)}</div>` : ""}
      </div>
      <button class="toggle" id="ctx-toggle">${ctxCollapsed ? "▾ Déplier le texte" : "▴ Replier le texte"}</button>
      <button class="open-text" id="open-text-inline">Lire le texte complet →</button>
    </section>
    ${ORDER.map(secHtml).join("")}
    <div class="actions">
      <button class="primary" id="submit" ${gravSet?"":"disabled"}>
        ${decisions[it.fiche_id].done ? "Mettre à jour & suivante" : "Valider la fiche & suivante"}${allDone?"":" ("+answered+"/"+ORDER.length+")"}</button>
      ${decisions[it.fiche_id].done ? '<span class="done-badge">✓ finie</span>' : ""}
    </div>
  </main>`;
  const tb = document.getElementById("tp-body");
  tb.innerHTML = `<div class="fl">Constats</div><div class="body-text">${esc(it.constats_body)}</div>` +
    (it.prescription ? `<div class="fl">Prescription</div><div class="body-text prescription">${esc(it.prescription)}</div>` : "");
  wire();
}

function wire() {
  const it = DATA.items[idx];
  document.getElementById("ctx-toggle").onclick = () => { ctxCollapsed = !ctxCollapsed; render(); };
  document.getElementById("open-text-inline")?.addEventListener("click", openText);
  document.querySelectorAll(".shead").forEach(h => h.onclick = () => {
    const f = h.dataset.sec; openSec = (openSec === f) ? null : f; render();
    document.querySelector(".sec.open")?.scrollIntoView({ block: "nearest", behavior: "smooth" });
  });
  document.querySelectorAll(".orow").forEach(b => b.onclick = () => selectOpt(b.dataset.field, b.dataset.opt));
  document.querySelector("[data-next]")?.addEventListener("click", advanceSection);
  document.getElementById("submit").onclick = submit;
}

function selectOpt(field, o) {
  const d = decisions[DATA.items[idx].fiche_id];
  if (MULTI.has(field)) {
    d[field] = d[field] || []; const i = d[field].indexOf(o);
    i === -1 ? d[field].push(o) : d[field].splice(i, 1);
    persist(); render();               // stay open for multi-select
  } else {
    d[field] = (d[field] === o) ? null : o;
    persist(); advanceSection();       // single: collapse + open next unanswered
  }
}
function advanceSection() {
  const rest = ORDER.filter(f => f !== openSec);
  openSec = ORDER.find(f => !isAnswered(f) && f !== openSec) || null;
  render();
  if (openSec) document.querySelector(".sec.open")?.scrollIntoView({ block: "nearest", behavior: "smooth" });
  else document.getElementById("submit")?.scrollIntoView({ block: "nearest", behavior: "smooth" });
}

function submit() {
  const it = DATA.items[idx], d = decisions[it.fiche_id];
  if (!isAnswered("gravity")) { openSec = "gravity"; render(); return; }
  d.done = true; d.ts = Date.now(); d.reviewer = document.getElementById("reviewer").value.trim();
  persist();
  if (idx < DATA.n - 1) { idx++; openSec = null; ctxCollapsed = false; closeText(); render(); window.scrollTo(0,0); }
  else render();
}

// nav + keyboard
document.getElementById("prev").onclick = () => { if (idx>0){ idx--; openSec=null; ctxCollapsed=false; closeText(); render(); window.scrollTo(0,0);} };
document.getElementById("next").onclick = () => { if (idx<DATA.n-1){ idx++; openSec=null; ctxCollapsed=false; closeText(); render(); window.scrollTo(0,0);} };
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || document.getElementById("help-modal")) {
    if (e.key === "Escape") document.getElementById("help-modal")?.remove();
    return;
  }
  if (e.key === "ArrowLeft") document.getElementById("prev").click();
  else if (e.key === "ArrowRight") document.getElementById("next").click();
  else if (e.key === "Enter") submit();
  else if (/^[1-9]$/.test(e.key) && openSec && !MULTI.has(openSec)) {
    const o = DATA.options[openSec][+e.key - 1]; if (o) selectOpt(openSec, o);
  }
});
document.getElementById("reviewer").onchange = () => { restore(); idx = firstUnreviewed(); openSec=null; render(); };

// export / import
document.getElementById("export").onclick = () => {
  const rev = document.getElementById("reviewer").value.trim() || "anon";
  const clean = {}; for (const [k,v] of Object.entries(decisions)) { const {done,...rest}=v; clean[k]={...rest,done:!!done}; }
  const blob = new Blob([JSON.stringify({ tool:"icpe-validation", version:2, archetype:"contextual",
    reviewer:rev, exported:new Date().toISOString(), source:"validation-sample.json", sample_seed:DATA.seed,
    total_items:DATA.n, reviewed_count:Object.values(decisions).filter(d=>d.done).length, decisions:clean }, null, 1)],
    { type:"application/json" });
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`validation-${rev}.json`; a.click();
};
document.getElementById("import").onclick = () => document.getElementById("file").click();
document.getElementById("file").onchange = (e) => { const f=e.target.files[0]; if(!f) return;
  f.text().then(t => { const d=JSON.parse(t); decisions=d.decisions||d; persist(); idx=firstUnreviewed(); openSec=null; render(); }); };
document.getElementById("theme").onclick = () => { const r=document.documentElement, dark=r.getAttribute("data-theme")==="dark";
  r.setAttribute("data-theme", dark?"light":"dark"); localStorage.setItem("icpe-validation:theme", dark?"light":"dark"); };
if (localStorage.getItem("icpe-validation:theme") === "dark") document.documentElement.setAttribute("data-theme","dark");

// help modal
const HELP_HTML = `
  <button class="close" id="help-close">Fermer ✕</button>
  <h2>Valider les tags à l'aveugle</h2>
  <p>Un modèle a classé ~10 500 fiches d'inspection ICPE sur 6 axes. Cette page mesure
  <b>à quel point ces tags sont justes</b>, en les comparant à ton jugement d'expert·e sur 100 fiches.</p>
  <h3>À l'aveugle, exprès</h3>
  <p>Le tag choisi par le modèle <b>ne t'est jamais montré</b> : tu le confirmerais sans le vouloir, ce qui
  fausserait la mesure. Tu lis la fiche, tu juges chaque axe toi-même.</p>
  <h3>Comment faire</h3>
  <ol>
    <li>Mets tes initiales dans <b>Relecteur·rice</b>.</li>
    <li>Lis les <b>Constats</b> (bouton « replier le texte » pour gagner de la place ensuite).</li>
    <li>Chaque axe s'ouvre à tour de rôle. Les options montrent <b>code, libellé et définition</b> — pas besoin
    de mémoriser. Tape une option : l'axe se referme et le suivant s'ouvre.</li>
    <li><b>Gravité</b> est obligatoire. <b>Domaine</b>, <b>Mécanisme</b> et <b>Modificateurs</b> acceptent plusieurs
    choix (bouton « Suivant › » pour passer). Rouvre un axe en tapant son titre pour corriger.</li>
    <li>Sur ordinateur : <span class="kbd">1</span>–<span class="kbd">9</span> choisissent dans l'axe ouvert,
    <span class="kbd">←</span> <span class="kbd">→</span> changent de fiche, <span class="kbd">Entrée</span> valide.</li>
    <li>À la fin, <b>Exporte</b> et transmets le JSON. Tout est sauvegardé au fur et à mesure.</li>
  </ol>
  <p style="color:var(--ink-soft);font-size:13px">Pas de « bonne » réponse imposée : le désaccord entre experts
  mesure précisément la part subjective de chaque axe.</p>`;
function openHelp() {
  const bg = document.createElement("div"); bg.className="modal-bg"; bg.id="help-modal";
  bg.innerHTML = `<div class="modal">${HELP_HTML}</div>`;
  bg.onclick = e => { if (e.target===bg || e.target.id==="help-close") bg.remove(); };
  document.body.appendChild(bg);
}
document.getElementById("help-btn").onclick = openHelp;

// peek-from-the-side text panel
const txtPanel = document.getElementById("text-panel"), txtBd = document.getElementById("text-backdrop");
function openText() { txtPanel.classList.add("open"); txtBd.classList.add("on"); txtPanel.setAttribute("aria-hidden", "false"); }
function closeText() { txtPanel.classList.remove("open"); txtBd.classList.remove("on"); txtPanel.setAttribute("aria-hidden", "true"); }
document.getElementById("text-tab").onclick = openText;
document.getElementById("tp-close").onclick = closeText;
txtBd.onclick = closeText;
let txtSwipeX = null;
txtPanel.addEventListener("pointerdown", e => { txtSwipeX = e.clientX; });
txtPanel.addEventListener("pointerup", e => { if (txtSwipeX != null && e.clientX - txtSwipeX > 60) closeText(); txtSwipeX = null; });
// close on Escape (folds into the existing keydown via a capture check)
document.addEventListener("keydown", e => { if (e.key === "Escape") closeText(); });

load();
</script>
</body>
